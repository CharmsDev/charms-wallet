<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charms Wallet - Connect</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      min-height: 400px;
      width: 360px;
      padding: 24px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #f7931a 0%, #ff6b00 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
    }
    .title {
      font-size: 20px;
      font-weight: 600;
    }
    .subtitle {
      font-size: 12px;
      color: #888;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .site-info {
      text-align: center;
      margin-bottom: 16px;
    }
    .site-icon {
      width: 64px;
      height: 64px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 12px;
    }
    .site-name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .site-url {
      font-size: 14px;
      color: #f7931a;
    }
    .message {
      text-align: center;
      font-size: 14px;
      color: #aaa;
      margin-bottom: 20px;
    }
    .permissions {
      font-size: 13px;
      color: #888;
      margin-bottom: 20px;
    }
    .permissions li {
      margin-bottom: 8px;
      padding-left: 20px;
      position: relative;
    }
    .permissions li::before {
      content: "✓";
      position: absolute;
      left: 0;
      color: #4ade80;
    }
    .buttons {
      display: flex;
      gap: 12px;
    }
    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-cancel {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    .btn-cancel:hover {
      background: rgba(255,255,255,0.15);
    }
    .btn-approve {
      background: linear-gradient(135deg, #f7931a 0%, #ff6b00 100%);
      color: white;
    }
    .btn-approve:hover {
      transform: scale(1.02);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">₿</div>
    <div>
      <div class="title">Charms Wallet</div>
      <div class="subtitle">Connection Request</div>
    </div>
  </div>

  <div class="card">
    <div class="site-info">
      <div class="site-icon">🌐</div>
      <div class="site-name" id="siteName">Loading...</div>
      <div class="site-url" id="siteUrl">-</div>
    </div>
  </div>

  <div class="message">
    This site wants to connect to your wallet
  </div>

  <ul class="permissions">
    <li>View your wallet address</li>
    <li>View your account balance</li>
    <li>Request transaction signatures</li>
  </ul>

  <div class="buttons">
    <button class="btn btn-cancel" id="btnCancel">Cancel</button>
    <button class="btn btn-approve" id="btnApprove">Connect</button>
  </div>

  <script src="approve.js"></script>
</body>
</html>
